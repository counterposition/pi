name: Release JSR

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish JSR packages when they exist
        run: |
          if ls packages/*/jsr.json >/dev/null 2>&1; then
            for manifest in packages/*/jsr.json; do
              package_dir=$(dirname "$manifest")
              echo "Publishing $package_dir to JSR"
              (
                cd "$package_dir"
                pnpm dlx jsr publish
              )
            done
          else
            echo "No JSR packages configured yet. This workflow remains dormant until a real JSR package is added."
          fi
